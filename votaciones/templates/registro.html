{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Crear Cuenta</h2>
    
    <input type="email" id="reg-email" placeholder="Correo electrónico" class="w-full p-2 mb-4 border rounded">
    <input type="password" id="reg-pass" placeholder="Contraseña" class="w-full p-2 mb-4 border rounded">
    
    <label class="block mb-2 text-sm font-medium text-gray-700">Selecciona tu Rol:</label>
    <select id="reg-rol" class="w-full p-2 mb-6 border rounded bg-gray-50">
        <option value="votante">Votante</option>
        <option value="admin">Administrador</option>
    </select>

    <button onclick="registrar()" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">
        Registrarse
    </button>

    <p class="mt-4 text-center text-sm">
        ¿Ya tienes cuenta? 
        <a href="/api/login/" class="text-blue-600 font-bold hover:underline">Inicia sesión aquí</a>
    </p>
</div>

<script>
    async function registrar() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const rol = document.getElementById('reg-rol').value;

        try {
            // 1. Registro en Firebase Auth
            const userCred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
            const token = await userCred.user.getIdToken();

            // 2. Enviar datos adicionales a tu API de Django
            const response = await fetch('/api/auth/registro/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('fb_token')
                },
                body: JSON.stringify({ 
                    email: email,
                    rol: rol 
                })
            });

            if (response.ok) {
                alert("Registro exitoso");
                window.location.href = '/api/login/';
            }
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
</script>
{% endblock %}
