{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h2>
    <input type="email" id="email" placeholder="Correo" class="w-full p-2 mb-4 border rounded">
    <input type="password" id="pass" placeholder="Contraseña" class="w-full p-2 mb-4 border rounded">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Entrar</button>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            const userCred = await firebase.auth().signInWithEmailAndPassword(email, pass);
            const token = await userCred.user.getIdToken();
            localStorage.setItem('fb_token', token); // Guardamos para las peticiones API
            window.location.href = '/api/votos/votar/';
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
<p class="mt-4 text-center text-sm">
    ¿No tienes una cuenta? 
    <a href="/api/registro/" class="text-green-600 font-bold hover:underline">Regístrate aquí</a>
</p>
{% endblock %}
